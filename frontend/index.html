<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="DSA Accountability Bot — Analytics Dashboard for tracking DSA progress, streaks, leaderboards, and study insights." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'" />
  <link rel="icon" type="image/png" href="/Dsalogo.png" />
  <title>DSA Accountability — Dashboard</title>
  <script>
    // Apply persisted theme + system preference BEFORE first paint to avoid FOUC.
    (function () {
      try {
        var stored = localStorage.getItem("app_theme_mode");
        var mode = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
        var dark =
          mode === "dark" ||
          (mode === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
